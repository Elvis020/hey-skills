<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">From evidence to reusable skill</title>
  <desc id="desc">A continuous path shows evidence being traced, shaped into a clear instruction, and carried into the next session.</desc>
  <rect width="1200" height="280" rx="12" fill="#1C1C1C"/>

  <path d="M94 126C244 126 270 126 384 126S542 126 600 126s104 0 216 0 164 0 290 0"
        fill="none" stroke="#363636" stroke-width="2" stroke-dasharray="4 10"/>

  <g transform="translate(78 54)">
    <circle cx="18" cy="38" r="6" fill="#7DD3FC"/>
    <circle cx="18" cy="66" r="6" fill="#7DD3FC" opacity=".72"/>
    <circle cx="18" cy="94" r="6" fill="#7DD3FC" opacity=".44"/>
    <path d="M38 38h104M38 66h76M38 94h90" stroke="#666" stroke-width="7" stroke-linecap="round"/>
    <circle cx="176" cy="66" r="34" fill="#242424" stroke="#A7F3D0" stroke-width="2"/>
    <path d="m164 67 9 9 18-22" fill="none" stroke="#A7F3D0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m201 91 22 22" stroke="#A7F3D0" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="162" fill="#E5E5E5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="650">Trace what is real</text>
    <text x="0" y="184" fill="#777" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" letter-spacing="1.4">01  EVIDENCE</text>
  </g>

  <g transform="translate(466 38)">
    <rect x="0" y="0" width="268" height="152" rx="10" fill="#242424" stroke="#414141"/>
    <rect x="22" y="22" width="74" height="74" rx="8" fill="#2E2E2E"/>
    <path d="M116 30h112M116 56h88M116 82h104" stroke="#666" stroke-width="7" stroke-linecap="round"/>
    <rect x="116" y="108" width="72" height="22" rx="6" fill="#E5E5E5"/>
    <circle cx="226" cy="24" r="12" fill="#7DD3FC"/>
    <path d="m229 28 18 18" stroke="#7DD3FC" stroke-width="2"/>
    <text x="0" y="194" fill="#E5E5E5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="650">Shape the instruction</text>
    <text x="0" y="216" fill="#777" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" letter-spacing="1.4">02  CLARITY</text>
  </g>

  <g transform="translate(850 50)">
    <rect x="20" y="18" width="142" height="104" rx="10" fill="#222" stroke="#414141"/>
    <rect x="52" y="0" width="142" height="104" rx="10" fill="#292929" stroke="#555"/>
    <circle cx="72" cy="24" r="6" fill="#A7F3D0"/>
    <path d="M90 24h76M72 50h94M72 72h68" stroke="#707070" stroke-width="6" stroke-linecap="round"/>
    <path d="M208 52h68" stroke="#A7F3D0" stroke-width="3" stroke-linecap="round"/>
    <path d="m265 42 12 10-12 10" fill="none" stroke="#A7F3D0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="290" cy="52" r="8" fill="#A7F3D0"/>
    <text x="20" y="176" fill="#E5E5E5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="650">Carry it forward</text>
    <text x="20" y="198" fill="#777" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" letter-spacing="1.4">03  CONTINUITY</text>
  </g>
</svg>
